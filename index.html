<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMYC - Sistema de Cotizaciones</title>
    <link rel="manifest" href="manifest.webmanifest">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-gray-100 font-sans p-4">
    <div class="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow-lg">
        
        <!-- Cabecera -->
        <div class="flex justify-between items-center border-b pb-4 mb-4">
            <div>
                <h1 class="text-3xl font-bold text-orange-600">DMYC Cotizaciones</h1>
                <p class="text-gray-500">RUT: 76.935.323-2 | Vendedor: Felipe Mesa</p>
            </div>
            <div class="text-right">
                <h2 class="text-xl font-bold text-gray-700" id="quoteNumber">COT-0400-XXXX</h2>
                <div class="mt-2 flex gap-2 justify-end">
                    <button id="btnViewHistory" class="bg-gray-800 text-white px-4 py-2 rounded">Ver Historial</button>
                    <button id="btnSync" class="bg-blue-600 text-white px-4 py-2 rounded">Sincronizar PC</button>
                </div>
            </div>
        </div>

        <!-- Vista Nueva Cotización -->
        <div id="newQuoteView">
            
            <!-- Moneda y Tipo de Cambio -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-orange-50 p-4 rounded mb-6">
                <div>
                    <label class="block font-bold">Moneda Costos:</label>
                    <select id="currency" class="w-full border p-2 rounded">
                        <option value="CLP">Pesos (CLP)</option>
                        <option value="USD">Dólares (USD)</option>
                    </select>
                </div>
                <div>
                    <label class="block font-bold">Valor Dólar Hoy (CLP):</label>
                    <input type="number" id="exchangeRate" value="950" class="w-full border p-2 rounded">
                </div>
            </div>

            <!-- Datos del Cliente -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 bg-gray-50 p-4 rounded border">
                <div class="col-span-1 md:col-span-3">
                    <h3 class="font-bold text-lg text-gray-700 border-b pb-2 mb-2">Datos del Cliente</h3>
                </div>
                <div><label class="block font-bold">Empresa / Cliente</label><input type="text" id="clientName" class="w-full border p-2 rounded" placeholder="Ej: Constructora Montec"></div>
                <div><label class="block font-bold">Contacto (Solicitante)</label><input type="text" id="clientContact" class="w-full border p-2 rounded" placeholder="Ej: Bárbara González"></div>
                <div><label class="block font-bold">RUT Empresa</label><input type="text" id="clientRut" class="w-full border p-2 rounded"></div>
                <div><label class="block font-bold">Dirección / Obra</label><input type="text" id="clientAddress" class="w-full border p-2 rounded"></div>
                <div><label class="block font-bold">Teléfono</label><input type="text" id="clientPhone" class="w-full border p-2 rounded"></div>
                <div><label class="block font-bold">Email</label><input type="email" id="clientEmail" class="w-full border p-2 rounded"></div>
                <div><label class="block font-bold">Estado de Cotización</label>
                    <select id="quoteStatus" class="w-full border p-2 rounded">
                        <option value="Pendiente">Pendiente</option>
                        <option value="Ganado">Ganado</option>
                        <option value="Perdido">Perdido</option>
                    </select>
                </div>
            </div>

            <!-- Materiales -->
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-xl font-bold border-b pb-2">Líneas de Materiales</h3>
                    <div>
                        <!-- Botón Carga Masiva Excel -->
                        <input type="file" id="bulkUpload" accept=".xlsx" class="hidden">
                        <button id="btnBulkUpload" class="bg-green-600 text-white px-4 py-2 rounded font-bold hover:bg-green-700">
                            📁 Cargar Excel Masivo
                        </button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-200">
                                <th class="p-2 border">Descripción</th>
                                <th class="p-2 border w-24">Cant.</th>
                                <th class="p-2 border w-24">Unid.</th>
                                <th class="p-2 border w-32">Costo</th>
                                <th class="p-2 border w-24">Margen %</th>
                                <th class="p-2 border w-32">P. Venta</th>
                                <th class="p-2 border w-32">Total</th>
                                <th class="p-2 border w-12"></th>
                            </tr>
                        </thead>
                        <tbody id="linesBody"></tbody>
                    </table>
                </div>
                <button id="btnAddLine" class="mt-2 bg-gray-300 text-gray-800 px-4 py-2 rounded font-bold">+ Agregar Línea Manual</button>
            </div>

            <!-- Observaciones y Totales -->
            <div class="flex flex-wrap md:flex-nowrap gap-6">
                <div class="w-full md:w-1/2">
                    <label class="block font-bold">Observaciones / Condiciones:</label>
                    <textarea id="notes" rows="4" class="w-full border p-2 rounded">Validez de la oferta: 5 días.
Forma de pago: 50% anticipo, 50% contra entrega.
Material para entrega inmediata en Santiago.</textarea>
                </div>
                <div class="w-full md:w-1/2 bg-gray-50 p-4 rounded border">
                    <div class="flex justify-between font-bold text-lg mb-2"><span>Subtotal Neto:</span><span id="subtotalText">$0</span></div>
                    <div class="flex justify-between font-bold text-lg mb-2 text-gray-600"><span>IVA 19%:</span><span id="ivaText">$0</span></div>
                    <div class="flex justify-between font-bold text-2xl text-orange-600 border-t pt-2"><span>TOTAL:</span><span id="totalText">$0</span></div>
                </div>
            </div>

            <!-- Botones de Guardar / Editar -->
            <div class="mt-6 text-right flex justify-end gap-4">
                <button id="btnCancelEdit" class="hidden bg-gray-500 text-white px-8 py-3 rounded-lg font-bold text-lg hover:bg-gray-600 shadow-lg">
                    ❌ Cancelar Edición
                </button>
                <button id="btnSave" class="bg-orange-600 text-white px-8 py-3 rounded-lg font-bold text-lg hover:bg-orange-700 shadow-lg">
                    💾 Guardar y Generar PDF
                </button>
            </div>
        </div>

        <!-- Vista de Historial -->
        <div id="historyView" class="hidden">
            <h2 class="text-2xl font-bold mb-4">Historial de Cotizaciones</h2>
            <button id="btnBackToNew" class="mb-4 bg-gray-300 px-4 py-2 rounded text-gray-800">← Volver a Nueva Cotización</button>
            <div class="overflow-x-auto">
                <table class="w-full bg-white border">
                    <thead class="bg-gray-800 text-white">
                        <tr>
                            <th class="p-2">Número</th>
                            <th class="p-2">Fecha</th>
                            <th class="p-2">Empresa</th>
                            <th class="p-2">Total</th>
                            <th class="p-2">Estado</th>
                            <th class="p-2">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Conexión a la lógica de la app -->
    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
